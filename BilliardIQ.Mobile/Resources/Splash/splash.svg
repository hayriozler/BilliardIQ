<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Dark table felt background -->
  <rect width="128" height="128" rx="18" fill="#0F1F0F"/>
  <!-- Table border -->
  <rect x="4" y="4" width="120" height="120" rx="14" fill="none" stroke="#4A3728" stroke-width="5"/>

  <!-- White cue ball -->
  <defs>
    <radialGradient id="wg" cx="38%" cy="32%" r="58%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="75%" stop-color="#ddd"/>
      <stop offset="100%" stop-color="#aaa"/>
    </radialGradient>
    <radialGradient id="yg" cx="38%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="65%" stop-color="#F0B800"/>
      <stop offset="100%" stop-color="#A87800"/>
    </radialGradient>
    <radialGradient id="rg" cx="38%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#FF7070"/>
      <stop offset="65%" stop-color="#D01010"/>
      <stop offset="100%" stop-color="#800000"/>
    </radialGradient>
  </defs>

  <circle cx="40" cy="72" r="17" fill="url(#wg)"/>
  <ellipse cx="34" cy="65" rx="5" ry="3" fill="white" opacity="0.7"/>

  <circle cx="64" cy="44" r="17" fill="url(#yg)"/>
  <ellipse cx="58" cy="37" rx="5" ry="3" fill="white" opacity="0.55"/>

  <circle cx="88" cy="72" r="17" fill="url(#rg)"/>
  <ellipse cx="82" cy="65" rx="5" ry="3" fill="white" opacity="0.55"/>

  <!-- Cue stick -->
  <line x1="108" y1="20" x2="18" y2="108" stroke="#C8A060" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
  <line x1="108" y1="20" x2="18" y2="108" stroke="#E8C080" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
