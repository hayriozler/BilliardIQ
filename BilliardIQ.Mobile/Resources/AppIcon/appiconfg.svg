<?xml version="1.0" encoding="UTF-8"?>
<svg width="456" height="456" viewBox="0 0 456 456" xmlns="http://www.w3.org/2000/svg">
  <!-- White cue ball - center, large -->
  <circle cx="228" cy="200" r="90" fill="white"/>
  <radialGradient id="wb" cx="38%" cy="32%" r="60%">
    <stop offset="0%" stop-color="white"/>
    <stop offset="70%" stop-color="#e8e8e8"/>
    <stop offset="100%" stop-color="#c0c0c0"/>
  </radialGradient>
  <circle cx="228" cy="200" r="90" fill="url(#wb)"/>
  <!-- Specular highlight on white ball -->
  <ellipse cx="200" cy="172" rx="22" ry="14" fill="white" opacity="0.8"/>

  <!-- Yellow object ball - bottom left -->
  <radialGradient id="yb" cx="38%" cy="32%" r="60%">
    <stop offset="0%" stop-color="#FFE566"/>
    <stop offset="60%" stop-color="#F5C400"/>
    <stop offset="100%" stop-color="#C89000"/>
  </radialGradient>
  <circle cx="148" cy="318" r="62" fill="url(#yb)"/>
  <ellipse cx="132" cy="300" rx="14" ry="9" fill="white" opacity="0.6"/>

  <!-- Red object ball - bottom right -->
  <radialGradient id="rb" cx="38%" cy="32%" r="60%">
    <stop offset="0%" stop-color="#FF6B6B"/>
    <stop offset="60%" stop-color="#E02020"/>
    <stop offset="100%" stop-color="#A00000"/>
  </radialGradient>
  <circle cx="308" cy="318" r="62" fill="url(#rb)"/>
  <ellipse cx="292" cy="300" rx="14" ry="9" fill="white" opacity="0.6"/>
</svg>
